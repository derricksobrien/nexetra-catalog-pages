<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexetra Course Catalog</title>
  <style>
    :root {
      --c-anthropic: #7C3AED;
      --c-nvidia: #5a9216;
      --c-openclaw: #ea6c0a;
      --c-shim: #475569;
      --sidebar: 268px;
      --radius: .75rem;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 14px rgba(0,0,0,.06);
      --shadow-h: 0 4px 12px rgba(0,0,0,.13), 0 8px 28px rgba(0,0,0,.09);
      --tr: all .17s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1e293b;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── HEADER ── */
    header {
      background: #0c1220;
      color: #fff;
      padding: .9rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
      height: 60px;
    }
    .logo { font-size: 1.25rem; font-weight: 800; letter-spacing: -.5px; }
    .logo span { color: #818cf8; }
    .logo-sub { font-size: .75rem; color: #64748b; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 1.5rem; }
    .header-count { font-size: .82rem; color: #94a3b8; }
    .header-count strong { color: #e2e8f0; font-size: .95rem; }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      max-width: 1700px;
      margin: 0 auto;
    }

    /* ── SIDEBAR ── */
    aside {
      width: var(--sidebar);
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e2e8f0;
      padding: 1.1rem 1rem 2rem;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

    /* search */
    .search-wrap { position: relative; margin-bottom: 1.1rem; }
    .search-icon {
      position: absolute; left: .65rem; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: #94a3b8; pointer-events: none;
    }
    #q {
      width: 100%;
      padding: .58rem .7rem .58rem 2.1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: .5rem;
      font-size: .82rem;
      background: #f8fafc;
      outline: none;
      transition: var(--tr);
      color: #1e293b;
    }
    #q:focus { border-color: #818cf8; background: #fff; box-shadow: 0 0 0 3px rgba(129,140,248,.15); }
    .clear-q {
      position: absolute; right: .4rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #94a3b8;
      font-size: 1rem; line-height: 1; padding: .2rem; display: none;
    }
    .clear-q:hover { color: #334155; }

    /* filter group */
    .fg { margin-bottom: 1.1rem; padding-bottom: 1.1rem; border-bottom: 1px solid #f1f5f9; }
    .fg:last-of-type { border-bottom: none; margin-bottom: 0; }
    .fg-title {
      font-size: .64rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .09em; color: #94a3b8; margin-bottom: .6rem;
    }
    .fo {
      display: flex; align-items: center; gap: .45rem;
      padding: .22rem .3rem; border-radius: .375rem;
      cursor: pointer; font-size: .8rem; color: #334155;
      user-select: none; transition: background .12s;
    }
    .fo:hover { background: #f1f5f9; }
    .fo input[type=checkbox] { width: 13px; height: 13px; accent-color: #4f46e5; cursor: pointer; flex-shrink: 0; }
    .fo .cnt { margin-left: auto; font-size: .68rem; color: #94a3b8; min-width: 16px; text-align: right; }
    .fo .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-anthropic { background: var(--c-anthropic); }
    .dot-nvidia    { background: var(--c-nvidia); }
    .dot-openclaw  { background: var(--c-openclaw); }
    .dot-shim      { background: var(--c-shim); }

    .reset-btn {
      width: 100%; margin-top: .6rem;
      padding: .48rem; background: none;
      border: 1.5px solid #e2e8f0; border-radius: .5rem;
      font-size: .78rem; color: #64748b; cursor: pointer;
      transition: var(--tr);
    }
    .reset-btn:hover { border-color: #94a3b8; background: #f8fafc; color: #1e293b; }

    /* active filter chips */
    #chips { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .75rem; }
    .chip {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .7rem; background: #ede9fe; color: #6d28d9;
      padding: .18rem .5rem; border-radius: 999px; cursor: pointer;
      border: none; transition: background .12s;
    }
    .chip:hover { background: #ddd6fe; }

    /* ── MAIN ── */
    main {
      flex: 1; min-width: 0;
      padding: 1.25rem 1.5rem;
    }

    .results-bar {
      display: flex; align-items: center; gap: .75rem; margin-bottom: 1.1rem;
    }
    .results-bar .rlabel { font-size: .82rem; color: #64748b; }
    .results-bar .rlabel strong { color: #1e293b; font-size: .95rem; }
    .sort-wrap { margin-left: auto; display: flex; align-items: center; gap: .4rem; }
    .sort-wrap label { font-size: .75rem; color: #64748b; }
    #sort {
      font-size: .78rem; border: 1.5px solid #e2e8f0; border-radius: .4rem;
      padding: .3rem .55rem; background: #fff; color: #334155;
      outline: none; cursor: pointer;
    }

    /* ── GRID ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.1rem; }

    /* section divider */
    .sec-div {
      grid-column: 1/-1; display: flex; align-items: center; gap: .75rem;
      padding: .5rem 0 .35rem; margin-top: .4rem;
    }
    .sec-div h2 { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: #94a3b8; white-space: nowrap; }
    .sec-div hr { flex: 1; border: none; border-top: 1.5px solid #e2e8f0; }

    /* ── CARD ── */
    .card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid #e9eef4;
      display: flex; flex-direction: column;
      transition: box-shadow .2s, transform .2s;
      overflow: hidden;
    }
    .card:hover { box-shadow: var(--shadow-h); transform: translateY(-2px); }

    .card-stripe { height: 4px; flex-shrink: 0; }
    .card-stripe.anthropic { background: var(--c-anthropic); }
    .card-stripe.nvidia    { background: var(--c-nvidia); }
    .card-stripe.openclaw  { background: var(--c-openclaw); }
    .card-stripe.shim      { background: var(--c-shim); }

    .card-body { padding: 1rem 1.15rem; flex: 1; }

    .card-meta { display: flex; align-items: center; gap: .45rem; margin-bottom: .55rem; flex-wrap: wrap; }
    .tbadge {
      font-size: .62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: .18rem .5rem; border-radius: 999px; flex-shrink: 0;
    }
    .tbadge.anthropic { background: #ede9fe; color: #5b21b6; }
    .tbadge.nvidia    { background: #ecfccb; color: #365314; }
    .tbadge.openclaw  { background: #fff7ed; color: #9a3412; }
    .tbadge.shim      { background: #f1f5f9; color: #334155; }

    .hw-pill {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .64rem; color: #64748b; background: #f8fafc;
      border: 1px solid #e2e8f0; padding: .14rem .45rem; border-radius: 999px;
    }
    .mc-badge {
      margin-left: auto; font-size: .66rem; color: #94a3b8;
      background: #f8fafc; border: 1px solid #e2e8f0; padding: .13rem .45rem; border-radius: 999px;
    }

    .card-title { font-size: .94rem; font-weight: 700; color: #0f172a; line-height: 1.3; margin-bottom: .45rem; }
    .card-desc  { font-size: .78rem; color: #64748b; line-height: 1.55; margin-bottom: .85rem; }

    /* modules toggle */
    .mod-toggle {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; background: none; border: 1.5px solid #e2e8f0; border-radius: .45rem;
      padding: .38rem .7rem; font-size: .75rem; color: #4f46e5; cursor: pointer;
      transition: var(--tr);
    }
    .mod-toggle:hover { border-color: #818cf8; background: #f5f3ff; }
    .mod-toggle svg { width: 13px; height: 13px; transition: transform .2s; flex-shrink: 0; }
    .mod-toggle.open svg { transform: rotate(180deg); }

    .mod-panel {
      overflow: hidden; max-height: 0; transition: max-height .28s ease;
    }
    .mod-panel.open { max-height: 700px; }
    .mod-panel-inner { padding: .6rem 0 .1rem; }

    .mod-item { padding: .45rem 0; border-bottom: 1px solid #f1f5f9; }
    .mod-item:last-child { border-bottom: none; }
    .mod-name {
      font-size: .78rem; font-weight: 600; color: #334155;
      display: flex; align-items: flex-start; gap: .4rem; margin-bottom: .28rem;
    }
    .mod-n { font-size: .67rem; color: #94a3b8; font-weight: 400; flex-shrink: 0; margin-top: 2px; }
    .obj-list { list-style: none; padding-left: 1.3rem; }
    .obj-list li {
      font-size: .72rem; color: #64748b; line-height: 1.5; padding: .07rem 0;
      position: relative;
    }
    .obj-list li::before { content: '›'; position: absolute; left: -.85rem; color: #94a3b8; }

    /* shim topics */
    .topic-head { font-size: .78rem; font-weight: 600; color: #334155; margin: .5rem 0 .35rem; }
    .res-item {
      padding: .35rem 0 .35rem .85rem;
      border-left: 2px solid #e2e8f0; margin-bottom: .3rem;
    }
    .res-link { font-size: .75rem; font-weight: 500; color: #4f46e5; text-decoration: none; }
    .res-link:hover { text-decoration: underline; }
    .res-sum { font-size: .7rem; color: #64748b; line-height: 1.45; margin: .12rem 0; }
    .res-hrs { font-size: .66rem; color: #94a3b8; }

    /* card footer */
    .card-foot {
      padding: .8rem 1.15rem; border-top: 1px solid #f1f5f9;
      display: flex; align-items: center; gap: .65rem; background: #fafbfc;
      flex-wrap: wrap;
    }
    .price { font-size: 1rem; font-weight: 700; color: #0f172a; }
    .dates { font-size: .68rem; color: #64748b; flex: 1; line-height: 1.55; min-width: 80px; }
    .dates-label { display: block; font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #94a3b8; margin-bottom: .1rem; }
    .btn-enroll {
      background: #4f46e5; color: #fff; border: none;
      padding: .45rem .95rem; border-radius: .45rem; font-size: .76rem; font-weight: 600;
      cursor: pointer; text-decoration: none; white-space: nowrap;
      transition: background .14s;
    }
    .btn-enroll:hover { background: #4338ca; }
    .btn-gh {
      font-size: .76rem; color: #64748b; text-decoration: none;
      display: inline-flex; align-items: center; gap: .25rem;
      white-space: nowrap; transition: color .14s;
    }
    .btn-gh:hover { color: #1e293b; }
    .btn-gh svg { width: 14px; height: 14px; }

    mark { background: #fef08a; border-radius: 2px; padding: 0 1px; color: inherit; }

    /* empty */
    .empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: #64748b; }
    .empty h3 { font-size: 1.1rem; color: #334155; margin-bottom: .5rem; }

    @media (max-width: 820px) {
      aside { display: none; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Nexe<span>tra</span></div>
    <div class="logo-sub">Course Catalog</div>
  </div>
  <div class="header-right">
    <div class="header-count" id="hcount"><strong>—</strong> courses &amp; packs</div>
  </div>
</header>

<div class="layout">
  <!-- ── SIDEBAR ── -->
  <aside id="sidebar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
      </svg>
      <input id="q" type="search" placeholder="Search courses, topics, skills…" autocomplete="off">
      <button class="clear-q" id="clearQ" title="Clear">✕</button>
    </div>

    <div id="chips"></div>

    <div class="fg">
      <div class="fg-title">Track</div>
      <label class="fo"><input type="checkbox" data-filter="track" value="anthropic"> <span class="dot dot-anthropic"></span> Anthropic Enterprise <span class="cnt" id="cnt-track-anthropic">6</span></label>
      <label class="fo"><input type="checkbox" data-filter="track" value="nvidia"> <span class="dot dot-nvidia"></span> NVIDIA HPC &amp; Dev <span class="cnt" id="cnt-track-nvidia">8</span></label>
      <label class="fo"><input type="checkbox" data-filter="track" value="openclaw"> <span class="dot dot-openclaw"></span> OpenClaw Lab Build <span class="cnt" id="cnt-track-openclaw">5</span></label>
    </div>

    <div class="fg">
      <div class="fg-title">Content Type</div>
      <label class="fo"><input type="checkbox" data-filter="type" value="course"> Full Course Track <span class="cnt" id="cnt-type-course">19</span></label>
      <label class="fo"><input type="checkbox" data-filter="type" value="shim"> Prerequisite Pack <span class="cnt" id="cnt-type-shim">3</span></label>
    </div>

    <div class="fg">
      <div class="fg-title">Price</div>
      <label class="fo"><input type="checkbox" data-filter="price" value="79"> $79 <span class="cnt" id="cnt-price-79">3</span></label>
      <label class="fo"><input type="checkbox" data-filter="price" value="997"> $997 <span class="cnt" id="cnt-price-997">11</span></label>
      <label class="fo"><input type="checkbox" data-filter="price" value="1197"> $1,197 <span class="cnt" id="cnt-price-1197">8</span></label>
    </div>

    <div class="fg">
      <div class="fg-title">Hardware</div>
      <label class="fo"><input type="checkbox" data-filter="hw" value="asus"> ASUS Ascent GX10 <span class="cnt" id="cnt-hw-asus">14</span></label>
      <label class="fo"><input type="checkbox" data-filter="hw" value="gb10"> NVIDIA GB10 <span class="cnt" id="cnt-hw-gb10">8</span></label>
      <label class="fo"><input type="checkbox" data-filter="hw" value="macmini"> Mac Mini / VNC <span class="cnt" id="cnt-hw-macmini">5</span></label>
    </div>

    <div class="fg">
      <div class="fg-title">Next Delivery</div>
      <label class="fo"><input type="checkbox" data-filter="month" value="2026-06"> June 2026 <span class="cnt" id="cnt-month-2026-06">3</span></label>
      <label class="fo"><input type="checkbox" data-filter="month" value="2026-08"> August 2026 <span class="cnt" id="cnt-month-2026-08">3</span></label>
      <label class="fo"><input type="checkbox" data-filter="month" value="2026-10"> October 2026 <span class="cnt" id="cnt-month-2026-10">3</span></label>
    </div>

    <div class="fg">
      <div class="fg-title">Modules per Course</div>
      <label class="fo"><input type="checkbox" data-filter="mods" value="4"> 4 modules <span class="cnt" id="cnt-mods-4"></span></label>
      <label class="fo"><input type="checkbox" data-filter="mods" value="5"> 5 modules <span class="cnt" id="cnt-mods-5"></span></label>
    </div>

    <button class="reset-btn" id="resetBtn">Reset all filters</button>
  </aside>

  <!-- ── MAIN ── -->
  <main>
    <div class="results-bar">
      <div class="rlabel" id="rlabel">Showing <strong id="rcount">—</strong> results</div>
      <div class="sort-wrap">
        <label for="sort">Sort:</label>
        <select id="sort">
          <option value="default">Default order</option>
          <option value="price-asc">Price: low → high</option>
          <option value="price-desc">Price: high → low</option>
          <option value="mods-desc">Most modules first</option>
          <option value="alpha">A → Z</option>
        </select>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const TRACKS_META = {
  anthropic: {
    label: 'Anthropic Enterprise', kicker: 'Track 1',
    hardware: 'ASUS Ascent GX10', hwKey: ['asus'],
    price: 997, priceKey: '997',
    delivery: ['2026-06-01','2026-08-03','2026-10-05'],
    stripeUrl: '#stripe-track-anthropic'
  },
  nvidia: {
    label: 'NVIDIA HPC & Developer', kicker: 'Track 2',
    hardware: 'ASUS Ascent GX10 + NVIDIA GB10', hwKey: ['asus','gb10'],
    price: 1197, priceKey: '1197',
    delivery: ['2026-06-15','2026-08-17','2026-10-19'],
    stripeUrl: '#stripe-track-nvidia'
  },
  openclaw: {
    label: 'OpenClaw Lab Build', kicker: 'Track 3',
    hardware: '6 × Mac Mini (VNC via Screens)', hwKey: ['macmini'],
    price: 997, priceKey: '997',
    delivery: ['2026-06-08','2026-08-10','2026-10-12'],
    stripeUrl: '#stripe-track-openclaw'
  }
};

const RAW_COURSES = [
  // ── ANTHROPIC ──
  { track:'anthropic', slug:'anthropic-01-claude-api', num:1,
    title:'Foundations of Claude API Integration',
    desc:'Authenticate, send messages, handle streaming, and build production-ready request patterns with the Claude API.',
    modules:[
      {t:'API Authentication & Rate Limits', o:['Configure API keys securely','Understand rate limit tiers','Implement retry-with-backoff patterns']},
      {t:'Messages API and Request Structure', o:['Construct well-formed API requests','Set temperature, max_tokens, and model parameters','Use system and human roles correctly']},
      {t:'Streaming Responses & Webhooks', o:['Implement server-sent events for streaming','Handle partial response chunks','Build real-time output pipelines']},
      {t:'Error Handling & Production Patterns', o:['Handle 4xx and 5xx error codes','Build circuit breakers','Log and monitor API usage']}
    ]
  },
  { track:'anthropic', slug:'anthropic-02-prompt-engineering', num:2,
    title:'Prompt Engineering for Business ROI',
    desc:'Design prompts that deliver measurable business outcomes through structured techniques and systematic evaluation.',
    modules:[
      {t:'System Prompts & Role Definition', o:['Write effective system prompts','Define assistant persona and constraints','Test prompt stability across inputs']},
      {t:'Chain-of-Thought & Few-Shot Patterns', o:['Apply chain-of-thought reasoning','Construct few-shot examples','Choose between zero-shot and few-shot approaches']},
      {t:'Output Format Control', o:['Force JSON and structured output','Parse and validate model responses','Handle edge cases in output parsing']},
      {t:'Measuring Prompt Performance', o:['Define prompt evaluation metrics','Build prompt test suites','Track performance over model updates']}
    ]
  },
  { track:'anthropic', slug:'anthropic-03-data-analysis', num:3,
    title:'AI Data Analysis Workflows with Claude',
    desc:'Build scalable pipelines that ingest documents, extract insights, and surface patterns using Claude as the analysis engine.',
    modules:[
      {t:'Data Ingestion & Document Processing', o:['Parse PDFs, CSVs, and unstructured text','Chunk documents for context windows','Build batch ingestion pipelines']},
      {t:'Summarization at Scale', o:['Implement map-reduce summarization','Handle multi-document synthesis','Control summary length and format']},
      {t:'Pattern Recognition & Anomaly Detection', o:['Prompt Claude for statistical reasoning','Identify trends in tabular data','Flag outliers with natural language explanations']},
      {t:'Building Analysis Pipelines', o:['Orchestrate multi-step analysis workflows','Cache intermediate results','Schedule recurring analysis jobs']},
      {t:'Reporting & Visualization Integration', o:['Generate executive summary narratives','Feed Claude outputs into dashboards','Automate report generation']}
    ]
  },
  { track:'anthropic', slug:'anthropic-04-fine-tuning', num:4,
    title:'Enterprise Fine-tuning & Custom Models',
    desc:'Prepare datasets, run fine-tuning jobs, and evaluate custom Claude models for enterprise-specific tasks.',
    modules:[
      {t:'When to Fine-tune vs. Prompt', o:['Identify use cases requiring fine-tuning','Calculate cost-benefit of fine-tuning','Set baseline performance benchmarks']},
      {t:'Dataset Preparation & Curation', o:['Structure training examples in JSONL format','Clean and deduplicate datasets','Balance positive and negative examples']},
      {t:'Fine-tuning Pipeline Setup', o:['Submit fine-tuning jobs via API','Monitor training progress','Handle dataset validation errors']},
      {t:'Evaluation & Deployment', o:['Run holdout set evaluation','A/B test fine-tuned vs. base model','Deploy fine-tuned model to production']}
    ]
  },
  { track:'anthropic', slug:'anthropic-05-production-pipelines', num:5,
    title:'Building Production AI Pipelines',
    desc:'Architect, orchestrate, and monitor production-grade AI pipelines with state management and cost controls.',
    modules:[
      {t:'Pipeline Architecture Patterns', o:['Choose between linear and DAG pipelines','Design for idempotency and retries','Handle long-running async tasks']},
      {t:'Orchestration with LangChain/LlamaIndex', o:['Build chains with LangChain','Index and query documents with LlamaIndex','Combine retrieval-augmented generation patterns']},
      {t:'Memory, Context & State Management', o:['Implement conversation memory','Manage context window budgets','Store and retrieve session state']},
      {t:'Monitoring & Observability', o:['Log token usage and costs','Set up alerts for error spikes','Build dashboards for pipeline health']},
      {t:'Cost Optimization Strategies', o:['Cache repeated prompts','Select optimal models per task tier','Implement prompt compression techniques']}
    ]
  },
  { track:'anthropic', slug:'anthropic-06-roi', num:6,
    title:'Measuring AI ROI & Business Impact',
    desc:'Quantify the business value of AI implementations with measurement frameworks, KPIs, and executive reporting.',
    modules:[
      {t:'Baseline Measurement Frameworks', o:['Define pre-AI performance baselines','Select comparable metrics','Document measurement methodology']},
      {t:'KPIs for AI Implementations', o:['Identify leading and lagging indicators','Set realistic improvement targets','Build KPI tracking dashboards']},
      {t:'A/B Testing AI Features', o:['Design controlled AI experiments','Calculate statistical significance','Interpret and act on results']},
      {t:'Executive Reporting & Business Cases', o:['Structure ROI presentations for executives','Quantify time and cost savings','Build the case for AI budget expansion']}
    ]
  },

  // ── NVIDIA ──
  { track:'nvidia', slug:'nvidia-01-gb10-fundamentals', num:1,
    title:'NVIDIA GB10 Superchip Fundamentals',
    desc:'Understand the Blackwell architecture, NVLink topology, and developer environment for the GB10 superchip.',

// ═══════════════════════════════════════════════
// FILTER + SORT
// ═══════════════════════════════════════════════
function matchesFilters(item) {
  if (state.q) {
    const q = state.q.toLowerCase();
    if (!item.searchText.includes(q)) return false;
  }
  if (state.tracks.size && !state.tracks.has(item.track)) return false;
  if (state.types.size && !state.types.has(item.type)) return false;
  if (state.prices.size && !state.prices.has(item.priceKey)) return false;
  if (state.hw.size) {
    const match = item.hwKey.some(k => state.hw.has(k));
    // shims have no hw key — if hw filter is on, exclude shims
    if (!match) return false;
  }
  if (state.months.size && item.type === 'course') {
    const hasMo = item.delivery.some(d => state.months.has(d.slice(0,7)));
    if (!hasMo) return false;
  }
  if (state.months.size && item.type === 'shim') return false;
  if (state.mods.size && item.type === 'course') {
    if (!state.mods.has(String(item.modules.length))) return false;
  }
  if (state.mods.size && item.type === 'shim') return false;
  return true;
}

function sortItems(items) {
  const arr = [...items];
  switch (state.sort) {
    case 'price-asc':  return arr.sort((a,b) => a.price - b.price);
    case 'price-desc': return arr.sort((a,b) => b.price - a.price);
    case 'mods-desc':  return arr.sort((a,b) => (b.modules||[]).length - (a.modules||[]).length);
    case 'alpha':      return arr.sort((a,b) => a.title.localeCompare(b.title));
    default:           return arr;
  }
}

// ═══════════════════════════════════════════════
// HIGHLIGHT
// ═══════════════════════════════════════════════
function hl(text) {
  if (!state.q) return escHtml(text);
  const q = state.q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

        GitHub

    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// TOGGLE PANEL
// ═══════════════════════════════════════════════
function togglePanel(btnId, panelId) {
  const btn = document.getElementById(btnId);
  const panel = document.getElementById(panelId);
  if (!btn || !panel) return;
  const open = panel.classList.toggle('open');
  btn.classList.toggle('open', open);
}

// ═══════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════
function render() {
  const filtered = sortItems(ALL.filter(matchesFilters));
  const courses = filtered.filter(i => i.type === 'course');
  const shims = filtered.filter(i => i.type === 'shim');

  const grid = document.getElementById('grid');
  let html = '';

  if (!filtered.length) {
    html = `<div class="empty"><h3>No results found</h3><p>Try adjusting your filters or search term.</p></div>`;
  } else {
    if (courses.length) {
      html += `<div class="sec-div"><h2>Course Tracks (${courses.length})</h2><hr></div>`;
      html += courses.map(renderCourse).join('');
    }
    if (shims.length) {
      html += `<div class="sec-div"><h2>Prerequisite Packs (${shims.length})</h2><hr></div>`;
      html += shims.map(renderShim).join('');
    }
  }

  grid.innerHTML = html;
  document.getElementById('rcount').textContent = filtered.length;
  document.getElementById('hcount').innerHTML = `<strong>${filtered.length}</strong> courses &amp; packs`;

  // update sidebar counts
  updateCounts(filtered);
  renderChips();
}

// ═══════════════════════════════════════════════
// SIDEBAR COUNTS
// ═══════════════════════════════════════════════
function updateCounts(filtered) {
  const count = (pred) => ALL.filter(i => matchesFilters(i) || pred(i)).length;

  // track
  ['anthropic','nvidia','openclaw'].forEach(t => {
    const el = document.getElementById(`cnt-track-${t}`);
    if (el) el.textContent = ALL.filter(i => { const saved=state.tracks; const tmp=new Set([t]); /* ignore track filter for this count */ return i.track===t && matchesWithout(i,'tracks'); }).length;
  });

  // type
  ['course','shim'].forEach(t => {
    const el = document.getElementById(`cnt-type-${t}`);
    if (el) el.textContent = ALL.filter(i => i.type===t && matchesWithout(i,'types')).length;
  });

  // price
  ['79','997','1197'].forEach(p => {
    const el = document.getElementById(`cnt-price-${p}`);
    if (el) el.textContent = ALL.filter(i => i.priceKey===p && matchesWithout(i,'prices')).length;
  });

  // hw
  const hwMap = { asus: 'asus', gb10: 'gb10', macmini: 'macmini' };
  Object.entries(hwMap).forEach(([k]) => {
    const el = document.getElementById(`cnt-hw-${k}`);
    if (el) el.textContent = ALL.filter(i => i.hwKey.includes(k) && matchesWithout(i,'hw')).length;
  });

  // months
  ['2026-06','2026-08','2026-10'].forEach(m => {
    const el = document.getElementById(`cnt-month-${m}`);
    if (el) el.textContent = ALL.filter(i => i.delivery && i.delivery.some(d=>d.startsWith(m)) && matchesWithout(i,'months')).length;
  });

  // mods
  [4,5].forEach(n => {
    const el = document.getElementById(`cnt-mods-${n}`);
    if (el) el.textContent = ALL.filter(i => i.type==='course' && i.modules.length===n && matchesWithout(i,'mods')).length;
  });
}

function matchesWithout(item, skipKey) {
  const saved = state[skipKey];
  state[skipKey] = new Set();
  const result = matchesFilters(item);
  state[skipKey] = saved;
  return result;
}

// ═══════════════════════════════════════════════
// CHIPS
// ═══════════════════════════════════════════════
const CHIP_LABELS = {
  tracks: { anthropic:'Track: Anthropic', nvidia:'Track: NVIDIA', openclaw:'Track: OpenClaw' },
  types:  { course:'Courses', shim:'Prerequisite Packs' },
  prices: { '79':'$79', '997':'$997', '1197':'$1,197' },
  hw:     { asus:'ASUS Ascent GX10', gb10:'NVIDIA GB10', macmini:'Mac Mini / VNC' },
  months: { '2026-06':'June 2026', '2026-08':'Aug 2026', '2026-10':'Oct 2026' },
  mods:   { '4':'4 modules', '5':'5 modules' }
};

function renderChips() {
  const box = document.getElementById('chips');
  const chips = [];
  const keys = ['tracks','types','prices','hw','months','mods'];
  keys.forEach(k => {
    state[k].forEach(v => {
      const lbl = CHIP_LABELS[k]?.[v] || v;
      chips.push(`<button class="chip" onclick="removeFilter('${k}','${v}')">✕ ${escHtml(lbl)}</button>`);
    });
  });
  if (state.q) chips.unshift(`<button class="chip" onclick="clearSearch()">✕ "${escHtml(state.q)}"</button>`);
  box.innerHTML = chips.join('');
}

function removeFilter(key, value) {
  state[key].delete(value);
  // uncheck the checkbox
  const cb = document.querySelector(`[data-filter="${key.replace(/s$/,'')}"][value="${value}"]`) ||
             document.querySelector(`[data-filter="${filterDataAttr(key)}"][value="${value}"]`);
  if (cb) cb.checked = false;
  render();
}

function filterDataAttr(stateKey) {
  const map = { tracks:'track', types:'type', prices:'price', hw:'hw', months:'month', mods:'mods' };
  return map[stateKey] || stateKey;
}

function clearSearch() {
  state.q = '';
  document.getElementById('q').value = '';
  document.getElementById('clearQ').style.display = 'none';
  render();
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
document.getElementById('q').addEventListener('input', e => {
  state.q = e.target.value.trim();
  document.getElementById('clearQ').style.display = state.q ? 'block' : 'none';
  render();
});

document.getElementById('clearQ').addEventListener('click', clearSearch);

document.querySelectorAll('[data-filter]').forEach(cb => {
  cb.addEventListener('change', () => {
    const key = cb.dataset.filter;
    const stateKey = { track:'tracks', type:'types', price:'prices', hw:'hw', month:'months', mods:'mods' }[key];
    if (!stateKey) return;
    if (cb.checked) state[stateKey].add(cb.value);
    else state[stateKey].delete(cb.value);
    render();
  });
});

document.getElementById('resetBtn').addEventListener('click', () => {
  state.q = ''; state.tracks = new Set(); state.types = new Set();
  state.prices = new Set(); state.hw = new Set();
  state.months = new Set(); state.mods = new Set();
  document.getElementById('q').value = '';
  document.getElementById('clearQ').style.display = 'none';
  document.querySelectorAll('[data-filter]').forEach(cb => cb.checked = false);
  render();
});

document.getElementById('sort').addEventListener('change', e => {
  state.sort = e.target.value;
  render();
});

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
render();
</script>
